<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    <link rel="stylesheet" href="./main.css">
    <link rel="stylesheet" href="./friends.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <style>
        html,
        body {
            position: relative;
            height: 100%;
        }
        
        body {
            background: #fff;
            font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
            font-size: 14px;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .friends {
            padding-block: 222px;
        }
        
        .swiper {
            width: 100%;
            padding-top: 50px;
            padding-bottom: 50px;
        }
        
        .swiper-slide {
            background-position: center;
            background-size: cover;
            width: 300px;
            height: 300px;
        }
        
        .swiper-slide img {
            display: block;
            width: 100%;
        }
    </style>
</head>
<body>
    
    <header class="site-header">
        <div class="container">
            
            <div class="header-wrapper">
                
                <a href="./index.html" data-aos="slide-right">
                    <img src="./img/my-logo.png" width="250" alt="image">
                </a>
                
                <nav class="navbar" data-aos="slide-down" data-aos-duration="1500" data-aos-easing="linear">
                    <ul class="navbar-list">
                        <li class="navbar-item">
                            <a class="navbar-link" href="./index.html">
                                О себя
                            </a>
                        </li>
                        
                        <li class="navbar-item">
                            <a class="navbar-link" href="./family.html">
                                Семья
                            </a>
                        </li>
                        
                        <li class="navbar-item">
                            <a class="navbar-link" href="./projects.html">
                                ПРОекты
                            </a>
                        </li>
                        
                        <li class="navbar-item">
                            <a class="navbar-link firdavs" href="./friends.html">
                                Одногрупники
                            </a>
                        </li>
                    </ul>
                </nav>
                
                <div class="header-box" data-aos="slide-left">
                    <button class="darkmode-btn">
                        <img class="dark-img" width="40" src="./images/darkicon.svg" alt="dark image">
                        <img class="light-img" width="40" src="./images/lighticon.svg" alt="light image">
                    </button>
                    
                    <button class="account-btn">
                        <img class="account-img" width="40" src="./images/account.svg" alt="">
                    </button>
                </div>
                
            </div>
            
        </div>
    </header>
    
    <main class="site-main">
        <section class="friends">
            <!-- Swiper -->
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <img src="./одногрупники/Abbos.png" />
                    </div>
                    <div class="swiper-slide">
                        <img src="./одногрупники/Abror.png" />
                    </div>
                    <div class="swiper-slide">
                        <img src="./одногрупники/Asilbek.png" />
                    </div>
                    <div class="swiper-slide">
                        <img src="./одногрупники/Asilbek2.png" />
                    </div>
                    <div class="swiper-slide">
                        <img src="./одногрупники/Aziz.png" />
                    </div>
                    <div class="swiper-slide">
                        <img src="./одногрупники/Ilyos.png" />
                    </div>
                    <div class="swiper-slide">
                        <img src="./одногрупники/Muxammadamin.png" />
                    </div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
        </section>
    </main>
    
    
    <footer class="site-footer">
        <div class="container">
            
            <div class="footer-wrapper">
                
                <a class="logo-link" href="./index.html">
                    <img class="logo-img" width="150" src="./images/logoimg.png" alt="">
                </a>
                
                <ul class="footer-list">
                    <li class="footer-item" data-aos="slide-down" data-aos-duration="1000" data-aos-delay="500">
                        <a class="footer-link"href="#">
                            О себя
                        </a>
                    </li>
                    
                    <li class="footer-item"  data-aos="slide-down" data-aos-duration="1000" data-aos-delay="700">
                        <a class="footer-link" href="#">
                            Семья
                        </a>
                    </li>
                    
                    <li class="footer-item"  data-aos="slide-down" data-aos-duration="1000" data-aos-delay="900">
                        <a class="footer-link" href="#">
                            ПРОЕКТЫ
                        </a>
                    </li>
                    
                    <li class="footer-item"  data-aos="slide-down" data-aos-duration="1000" data-aos-delay="1100">
                        <a class="footer-link footer-friends-link" href="#">
                            Одногрупники
                        </a>
                    </li>
                </ul>
                
            </div>
            
        </div>
    </footer>
    
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    
    <script>
        AOS.init();
    </script>
</body>
</html>
